  perspective: 0.0015
  flipud: 0.0
  fliplr: 0.0
  bgr: 0.0
  mosaic: 0.85
  mixup: 0.2
  cutmix: 0.0
  copy_paste: 0.2
  copy_paste_mode: flip

wandb:
  enabled: true
  project: tech-core-yolo-pose
  entity: 183842220-hkust
  group: yolo11-pose-gray-real20260408-transfer
