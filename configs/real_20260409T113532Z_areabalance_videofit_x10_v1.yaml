source:
  root: data/real_20260409T113532Z.resplit_rand811_v1.yolov8
  data_yaml: data/real_20260409T113532Z.resplit_rand811_v1.yolov8/data.yaml

output:
  root: data/real_20260409T113532Z.areabalance_videofit_x10_v1.yolov8
  clean_output: true

runtime:
  seed: 52
  keep_original_train: true
  generated_multiplier: 9
  max_attempts_per_bin: 12
  image_suffix: .jpg
  label_suffix: .txt
  strategy_preference: video_reframe

metric:
  imgsz: 960
  min_area_ratio: 0.005
  max_area_ratio: 0.05
  bin_count: 9
  target_margin_ratio: 0.15

geometry:
  object_scale:
    enabled: true
    input_size_px: 960
    context_scale_range: [1.10, 1.42]
    center_jitter_ratio: 0.08
    exclusion_margin_ratio: 0.12
    feather_px: 16
    min_source_context_px: 96
  video_reframe:
    enabled: true
    output_width: 1280
    output_height: 720
    input_size_px: 960
    context_scale_range: [1.08, 1.35]
    center_x_range: [0.48, 0.72]
    center_y_range: [0.58, 0.82]
    exclusion_margin_ratio: 0.12
    feather_px: 20
    min_source_context_px: 96
    target_area_tolerance_ratio: 0.002

appearance:
  brightness_contrast:
    enabled: true
    prob: 0.8
    brightness_range: [-30.0, 30.0]
    contrast_range: [0.8, 1.2]
  gamma:
    enabled: true
    prob: 0.72
    range: [0.76, 1.24]
  hsv:
    enabled: true
    prob: 0.55
    hue_range: [-28.0, 28.0]
    sat_range: [0.45, 1.8]
    val_range: [0.72, 1.32]
  temperature_tint:
    enabled: true
    prob: 0.42
    temperature_range: [-28.0, 28.0]
    tint_range: [-14.0, 14.0]
  rgb_shift:
    enabled: true
    prob: 0.42
    shift_range: [-48.0, 48.0]
  dominant_channel:
    enabled: true
    prob: 0.32
    dominant_gain_range: [1.15, 1.8]
    other_gain_range: [0.35, 0.95]
    bias_range: [-16.0, 16.0]
  channel_shuffle:
    enabled: true
    prob: 0.18
  channel_gain:
    enabled: true
    prob: 0.55
    range: [0.55, 1.65]
  highlight_exposure:
    enabled: true
    prob: 0.35
    gain_range: [1.10, 1.45]
    threshold_range: [140, 215]
    rolloff_range: [16.0, 54.0]
  blur:
    enabled: true
    prob: 0.35
    kernel_choices: [3, 5, 7]
  motion_blur:
    enabled: true
    prob: 0.45
    kernel_choices: [5, 7, 9]
  noise:
    enabled: true
    prob: 0.45
    std_range: [2.0, 16.0]
  jpeg:
    enabled: true
    prob: 0.45
    quality_range: [28, 82]
  clahe:
    enabled: true
    prob: 0.22
    clip_limit_range: [1.4, 3.0]
    tile_grid_choices: [6, 8, 10]
  unsharp_mask:
    enabled: true
    prob: 0.2
    kernel_choices: [3, 5]
    amount_range: [0.25, 0.9]
  shadow:
    enabled: true
    prob: 0.3
    darkness_range: [0.2, 0.45]
    major_axis_ratio: [0.18, 0.42]
    minor_axis_ratio: [0.12, 0.3]
    blur_kernel_choices: [31, 51, 71]

occlusion:
  cutout:
    enabled: true
    prob: 0.12
    count_range: [1, 2]
    size_ratio_range: [0.06, 0.12]
    fill_mode: local_patch
  edge_cutout:
    enabled: true
    prob: 0.3
    count_range: [1, 2]
    thickness_ratio_range: [0.04, 0.1]
    length_ratio_range: [0.18, 0.45]
    fill_mode: mean
  corner_cutout:
    enabled: true
    prob: 0.08
    size_ratio_range: [0.08, 0.16]
    fill_mode: random

filter:
  analysis_imgsz: 960
  min_bbox_area_ratio: 0.0008
  min_visible_keypoints_floor: 18
  min_visible_keypoints_ratio: 0.72
  min_bbox_width_px: 12
  min_bbox_height_px: 12
  max_out_of_frame_ratio: 0.35
  max_out_of_frame_ratio_aggressive: 0.25

review:
  enabled: true
  per_bin: 12
  export_dir: analysis/review
