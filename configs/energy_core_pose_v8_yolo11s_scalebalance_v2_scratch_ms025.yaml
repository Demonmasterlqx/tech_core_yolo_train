model: yolo11s-pose.yaml
data: data/Energy_Core_Position_Estimate.v8-add-blue-real-marker.scalebalance_moderate_v2.yolov8/data.yaml
device: '0'
project: runs/pose
name: v8_yolo11s_gray_scalebalance_v2_scratch_ms025_b8_lr1e3_e500
seed: 52
init_mode: scratch

preprocess:
  grayscale: true

train:
  epochs: 500
  batch: 8
  imgsz: 960
  workers: 8
  patience: 80
  save: true
  save_period: -1
  cache: ram
  plots: true
  exist_ok: false
  verbose: true
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.2
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 1
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  box: 7.5
  cls: 0.5
  dfl: 1.5
  pose: 36.0
  kobj: 1.0
  cos_lr: true
  close_mosaic: 10
  multi_scale: 0.25
  amp: false
  deterministic: true
  auto_augment: randaugment
  erasing: 0.35

augment:
  hsv_h: 0.02
  hsv_s: 0.35
  hsv_v: 0.22
  degrees: 7.0
  translate: 0.14
  scale: 0.38
  shear: 4.0
  perspective: 0.0015
  flipud: 0.0
  fliplr: 0.0
  bgr: 0.0
  mosaic: 0.85
  mixup: 0.2
  cutmix: 0.0
  copy_paste: 0.2
  copy_paste_mode: flip

wandb:
  enabled: false
  project: tech-core-yolo-pose
  entity: null
  group: yolo11s-scalebalance-v2-scratch
  batch_log_interval: 50
  upload_checkpoints: true
  checkpoint_policy: live
  tags:
    - pose
    - energy-core
    - yolo11s
    - gray
    - scratch
    - scalebalance-v2
    - multiscale
  notes: >
    Scratch YOLO11s pose training on the self-contained scale-balance v2 dataset
    using the S14 gray augmentation recipe with multi_scale=0.25 and a higher
    batch/lr profile for scratch optimization.

post_eval:
  enabled: false
  project: runs/pose_test
  splits:
    - valid
    - test
  imgsz: 960
  batch: 8
  conf: 0.25
  line_width: 2
