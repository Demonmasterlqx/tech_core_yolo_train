model: runs/pose/v8_yolo11s_gray_scalebalance_v2_scratch_ms025_b8_lr1e3_e500/weights/best.pt
data: data/Energy_Core_Position_Estimate.v8-add-blue-real-marker.scalebalance_moderate_v2.yolov8/data.yaml
device: '7'
project: runs/pose
name: v8_yolo11_pose_gray_s18_scalebalance_v2_from_scratch_ms025_refine_s12like_e160
seed: 52
init_mode: pretrained

preprocess:
  grayscale: true

train:
  epochs: 160
  batch: 4
  imgsz: 960
  workers: 8
  patience: 40
  save: true
  save_period: -1
  cache: ram
  plots: true
  exist_ok: false
  verbose: true
  optimizer: AdamW
  lr0: 1.0e-05
  lrf: 0.2
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 1
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  box: 7.5
  cls: 0.5
  dfl: 1.5
  pose: 36.0
  kobj: 1.0
  cos_lr: true
  close_mosaic: 10
  multi_scale: 0.25
  amp: false
  deterministic: true
  auto_augment: randaugment
  erasing: 0.25

augment:
  hsv_h: 0.02
  hsv_s: 0.30
  hsv_v: 0.18
  degrees: 5.0
  translate: 0.10
  scale: 0.30
  shear: 3.0
  perspective: 0.001
  flipud: 0.0
  fliplr: 0.0
  bgr: 0.0
  mosaic: 0.70
  mixup: 0.15
  cutmix: 0.0
  copy_paste: 0.15
  copy_paste_mode: flip

wandb:
  enabled: true
  project: tech-core-yolo-pose
  entity: 183842220-hkust
  group: yolo11-pose-gray-scalebalance-v2-refine
  batch_log_interval: 50
  upload_checkpoints: true
  checkpoint_policy: live
  tags:
    - pose
    - energy-core
    - yolo11
    - yolo11s
    - gray
    - scalebalance-v2
    - refine
    - from-scratch
    - multiscale
    - s12like
  notes: >
    Continue the scratch scale-balance v2 YOLO11s run from its current best
    checkpoint with a lower learning rate and S12-like gentler augmentation
    while keeping multi_scale=0.25 enabled.

post_eval:
  enabled: false
  project: runs/pose_test
  splits:
    - valid
    - test
  imgsz: 960
  batch: 8
  conf: 0.25
  line_width: 2
