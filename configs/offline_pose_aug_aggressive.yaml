source:
  root: data/Energy_Core_Position_Estimate.v8-add-blue-real-marker.yolov8
  data_yaml: data/Energy_Core_Position_Estimate.v8-add-blue-real-marker.yolov8/data.yaml

output:
  root: data/Energy_Core_Position_Estimate.v8-add-blue-real-marker.offlineaug_aggressive_v1.yolov8
  clean_output: true

runtime:
  seed: 52
  num_aug_per_image: 4
  keep_original_train: true
  image_suffix: .jpg
  label_suffix: .txt
  max_attempts_per_augment: 16

geometry:
  border_mode: reflect101
  rotate:
    enabled: true
    prob: 0.85
    range_deg: [-12.0, 12.0]
  scale:
    enabled: true
    prob: 0.8
    range: [0.82, 1.22]
  translate:
    enabled: true
    prob: 0.8
    range_ratio: [-0.1, 0.1]
  perspective:
    enabled: true
    prob: 0.35
    strength_range: [0.015, 0.05]
  crop:
    enabled: true
    prob: 0.22
    scale_range: [0.85, 0.96]
    center_jitter_ratio: [1.0, 1.0]

appearance:
  brightness_contrast:
    enabled: true
    prob: 0.9
    brightness_range: [-36.0, 36.0]
    contrast_range: [0.8, 1.26]
  gamma:
    enabled: true
    prob: 0.8
    range: [0.72, 1.28]
  hsv:
    enabled: true
    prob: 0.35
    hue_range: [-12.0, 12.0]
    sat_range: [0.75, 1.28]
    val_range: [0.78, 1.22]
  blur:
    enabled: true
    prob: 0.45
    kernel_choices: [3, 5, 7]
  noise:
    enabled: true
    prob: 0.6
    std_range: [4.0, 14.0]
  jpeg:
    enabled: true
    prob: 0.4
    quality_range: [45, 90]
  shadow:
    enabled: true
    prob: 0.3
    darkness_range: [0.28, 0.62]
    major_axis_ratio: [0.2, 0.5]
    minor_axis_ratio: [0.12, 0.34]
    blur_kernel_choices: [31, 51, 71, 91]

occlusion:
  cutout:
    enabled: true
    prob: 0.22
    count_range: [1, 3]
    size_ratio_range: [0.12, 0.28]
    fill_mode: mean

filter:
  min_bbox_area_ratio: 0.0015
  min_visible_keypoints: 20
  min_bbox_width_px: 16
  min_bbox_height_px: 16
  max_out_of_frame_ratio: 0.5

review:
  enabled: true
  per_template: 24
  export_dir: analysis/review

templates:
  light:
    weight: 0.8
    geometry: [rotate, scale, translate]
    appearance: [brightness_contrast, gamma, noise, blur]
    occlusion: []
  viewpoint:
    weight: 1.0
    geometry: [rotate, scale, translate, perspective, crop]
    appearance: [brightness_contrast, gamma]
    occlusion: []
  lighting:
    weight: 0.9
    geometry: [rotate, translate]
    appearance: [brightness_contrast, gamma, shadow, blur, jpeg, hsv]
    occlusion: []
  occlusion:
    weight: 0.9
    geometry: [rotate, scale, translate]
    appearance: [brightness_contrast, noise, jpeg]
    occlusion: [cutout]
  mixed:
    weight: 1.1
    geometry: [rotate, scale, translate, perspective, crop]
    appearance: [gamma, blur, jpeg, hsv]
    occlusion: [cutout]
