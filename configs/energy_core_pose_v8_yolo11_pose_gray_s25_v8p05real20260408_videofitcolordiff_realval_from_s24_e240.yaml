model: runs/pose/v8_yolo11_pose_gray_s24_real20260408_videofit_r811_from_s20_e240/weights/best.pt
data: data/Energy_Core_Position_Estimate.v8p05_plus_real20260408.offlineaug_videofit_v3_colordiff_realval_v1.yolov8/data.yaml
device: '7'
project: runs/pose
name: v8_yolo11_pose_gray_s25_v8p05real20260408_videofitcolordiff_realval_from_s24_e240
seed: 52
init_mode: pretrained

preprocess:
  grayscale: true

train:
  epochs: 240
  batch: 4
  imgsz: 960
  workers: 8
  patience: 60
  save: true
  save_period: -1
  cache: ram
  plots: true
  exist_ok: false
  verbose: true
  optimizer: AdamW
  lr0: 8.0e-06
  lrf: 0.2
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 1
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  box: 7.5
  cls: 0.5
  dfl: 1.5
  pose: 36.0
  kobj: 1.0
  cos_lr: true
  close_mosaic: 10
  amp: false
  deterministic: true
  auto_augment: randaugment
  erasing: 0.35

augment:
  hsv_h: 0.02
  hsv_s: 0.35
  hsv_v: 0.22
  degrees: 7.0
  translate: 0.14
  scale: 0.38
  shear: 4.0
  perspective: 0.0015
  flipud: 0.0
  fliplr: 0.0
  bgr: 0.0
  mosaic: 0.85
  mixup: 0.2
  cutmix: 0.0
  copy_paste: 0.2
  copy_paste_mode: flip

wandb:
  enabled: true
  project: tech-core-yolo-pose
  entity: 183842220-hkust
  group: yolo11-pose-gray-videofit
  batch_log_interval: 50
  upload_checkpoints: true
  checkpoint_policy: live
  tags:
    - pose
    - energy-core
    - yolo11
    - yolo11s
    - gray
    - v8p05
    - real20260408
    - videofit
    - colordiff
    - realval
    - transfer
    - from-s24
    - proxy10080
  notes: >
    Transfer training from the s24 videofit checkpoint onto the mixed
    v8p05+real20260408 video-fit colordiff dataset while keeping evaluation on
    real-only valid/test.

post_eval:
  enabled: true
  project: runs/pose_test
  splits:
    - valid
    - test
  imgsz: 960
  batch: 8
  conf: 0.25
  line_width: 2
