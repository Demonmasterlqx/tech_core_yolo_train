source:
  root: data/Energy_Core_Position_Estimate.v8p05_plus_real20260408_trainmix_realval_v1.yolov8
  data_yaml: data/Energy_Core_Position_Estimate.v8p05_plus_real20260408_trainmix_realval_v1.yolov8/data.yaml

output:
  root: data/Energy_Core_Position_Estimate.v8p05_plus_real20260408.offlineaug_videofit_v3_colordiff_realval_v1.yolov8
  clean_output: true

runtime:
  seed: 52
  num_aug_per_image: 20
  keep_original_train: true
  image_suffix: .jpg
  label_suffix: .txt
  max_attempts_per_augment: 24

geometry:
  border_mode: reflect101
  rotate:
    enabled: true
    prob: 0.4
    range_deg: [-14.0, 14.0]
  scale:
    enabled: true
    prob: 0.2
    range: [0.96, 1.05]
  translate:
    enabled: true
    prob: 0.35
    x_range_ratio: [-0.05, 0.05]
    y_range_ratio: [-0.05, 0.05]
  shear:
    enabled: true
    prob: 0.2
    range_deg: [-2.0, 2.0]
  perspective:
    enabled: true
    prob: 0.3
    strength_range: [0.004, 0.02]
  bbox_crop:
    enabled: true
    prob: 0.08
    scale_range: [0.94, 0.99]
    jitter_x_bbox_ratio: 0.04
    jitter_y_bbox_ratio: 0.04
  object_scale:
    enabled: true
    prob: 1.0
    context_scale_range: [1.12, 1.4]
    resize_scale_range: [0.28, 0.55]
    center_jitter_ratio: 0.08
    exclusion_margin_ratio: 0.12
    feather_px: 16
    min_source_context_px: 96
  video_reframe:
    enabled: true
    prob: 1.0
    output_width: 1280
    output_height: 720
    input_size_px: 960
    context_scale_range: [1.08, 1.35]
    target_input_max_side_range: [90.0, 150.0]
    center_x_range: [0.48, 0.72]
    center_y_range: [0.58, 0.82]
    exclusion_margin_ratio: 0.12
    feather_px: 20
    min_source_context_px: 96

appearance:
  brightness_contrast:
    enabled: true
    prob: 0.75
    brightness_range: [-28.0, 28.0]
    contrast_range: [0.8, 1.18]
  gamma:
    enabled: true
    prob: 0.65
    range: [0.78, 1.22]
  hsv:
    enabled: true
    prob: 0.55
    hue_range: [-28.0, 28.0]
    sat_range: [0.45, 1.75]
    val_range: [0.72, 1.32]
  rgb_shift:
    enabled: true
    prob: 0.45
    shift_range: [-48.0, 48.0]
  dominant_channel:
    enabled: true
    prob: 0.35
    dominant_gain_range: [1.15, 1.8]
    other_gain_range: [0.35, 0.95]
    bias_range: [-16.0, 16.0]
  channel_shuffle:
    enabled: true
    prob: 0.18
  blur:
    enabled: true
    prob: 0.35
    kernel_choices: [3, 5, 7]
  motion_blur:
    enabled: true
    prob: 0.45
    kernel_choices: [5, 7, 9]
  noise:
    enabled: true
    prob: 0.45
    std_range: [2.0, 16.0]
  jpeg:
    enabled: true
    prob: 0.45
    quality_range: [28, 82]
  clahe:
    enabled: true
    prob: 0.22
    clip_limit_range: [1.4, 3.0]
    tile_grid_choices: [6, 8, 10]
  channel_gain:
    enabled: true
    prob: 0.55
    range: [0.55, 1.65]
  shadow:
    enabled: true
    prob: 0.3
    darkness_range: [0.2, 0.45]
    major_axis_ratio: [0.18, 0.42]
    minor_axis_ratio: [0.12, 0.3]
    blur_kernel_choices: [31, 51, 71]

occlusion:
  cutout:
    enabled: true
    prob: 0.12
    count_range: [1, 2]
    size_ratio_range: [0.06, 0.12]
    fill_mode: local_patch
  edge_cutout:
    enabled: true
    prob: 0.3
    count_range: [1, 2]
    thickness_ratio_range: [0.04, 0.1]
    length_ratio_range: [0.18, 0.45]
    fill_mode: mean
  corner_cutout:
    enabled: true
    prob: 0.08
    size_ratio_range: [0.08, 0.16]
    fill_mode: random

filter:
  analysis_imgsz: 960
  min_bbox_area_ratio: 0.001
  min_visible_keypoints_floor: 18
  min_visible_keypoints_ratio: 0.72
  min_bbox_width_px: 14
  min_bbox_height_px: 14
  max_out_of_frame_ratio: 0.45
  max_out_of_frame_ratio_aggressive: 0.35

review:
  enabled: true
  per_template: 24
  export_dir: analysis/review

templates:
  video_small_center:
    weight: 1.0
    geometry: [video_reframe]
    video_reframe:
      target_input_max_side_range: [100.0, 135.0]
      center_x_range: [0.48, 0.66]
      center_y_range: [0.62, 0.8]
    appearance: [brightness_contrast, gamma, channel_gain]
    occlusion: []
  video_small_tilt:
    weight: 0.9
    geometry: [video_reframe, rotate, perspective]
    video_reframe:
      target_input_max_side_range: [95.0, 145.0]
      center_x_range: [0.5, 0.7]
      center_y_range: [0.6, 0.82]
    appearance: [jpeg]
    occlusion: []
  video_small_motion:
    weight: 1.0
    geometry: [video_reframe]
    video_reframe:
      target_input_max_side_range: [85.0, 125.0]
      center_x_range: [0.52, 0.72]
      center_y_range: [0.6, 0.82]
    appearance: [motion_blur, noise, jpeg, rgb_shift]
    occlusion: []
  video_small_occluded:
    weight: 0.9
    geometry: [video_reframe]
    video_reframe:
      target_input_max_side_range: [95.0, 140.0]
      center_x_range: [0.54, 0.74]
      center_y_range: [0.6, 0.82]
    appearance: [shadow]
    occlusion: [edge_cutout]
  video_small_color_soft:
    weight: 1.0
    geometry: [video_reframe]
    video_reframe:
      target_input_max_side_range: [90.0, 135.0]
      center_x_range: [0.48, 0.72]
      center_y_range: [0.58, 0.82]
    appearance: [brightness_contrast, gamma, hsv, channel_gain]
    occlusion: []
  video_small_color_hard:
    weight: 1.0
    geometry: [video_reframe]
    video_reframe:
      target_input_max_side_range: [90.0, 135.0]
      center_x_range: [0.48, 0.72]
      center_y_range: [0.58, 0.82]
    appearance: [hsv, rgb_shift, dominant_channel, channel_shuffle, jpeg]
    occlusion: []
  object_zoom_out:
    weight: 0.4
    geometry: [object_scale, rotate, translate]
    object_scale:
      context_scale_range: [1.15, 1.45]
      resize_scale_range: [0.28, 0.55]
      center_jitter_ratio: 0.08
    appearance: [brightness_contrast, gamma]
    occlusion: []
