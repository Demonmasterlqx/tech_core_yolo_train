source:
  root: data/Energy_Core_Position_Estimate.v9-960-960-realmix_dataset.yolov8
  data_yaml: data/Energy_Core_Position_Estimate.v9-960-960-realmix_dataset.yolov8/data.yaml

output:
  root: data/Energy_Core_Position_Estimate.v9-960-960-realmix_dataset.areabalance_x10_v1.yolov8
  clean_output: true

runtime:
  seed: 52
  keep_original_train: true
  generated_multiplier: 9
  max_attempts_per_bin: 10
  image_suffix: .jpg
  label_suffix: .txt
  strategy_preference: object_scale

metric:
  imgsz: 960
  min_area_ratio: 0.005
  max_area_ratio: 0.05
  bin_count: 9
  target_margin_ratio: 0.15

geometry:
  object_scale:
    enabled: true
    input_size_px: 960
    context_scale_range: [1.08, 1.35]
    center_jitter_ratio: 0.08
    exclusion_margin_ratio: 0.12
    feather_px: 16
    min_source_context_px: 96
  video_reframe:
    enabled: false
    output_width: 1280
    output_height: 720
    input_size_px: 960
    context_scale_range: [1.08, 1.30]
    center_x_range: [0.45, 0.75]
    center_y_range: [0.45, 0.75]
    exclusion_margin_ratio: 0.12
    feather_px: 16
    min_source_context_px: 96
    target_area_tolerance_ratio: 0.002

appearance:
  brightness_contrast:
    enabled: true
    prob: 0.8
    brightness_range: [-28.0, 28.0]
    contrast_range: [0.82, 1.2]
  gamma:
    enabled: true
    prob: 0.7
    range: [0.78, 1.24]
  hsv:
    enabled: true
    prob: 0.35
    hue_range: [-12.0, 12.0]
    sat_range: [0.75, 1.35]
    val_range: [0.82, 1.18]
  temperature_tint:
    enabled: true
    prob: 0.25
    temperature_range: [-18.0, 18.0]
    tint_range: [-10.0, 10.0]
  rgb_shift:
    enabled: true
    prob: 0.25
    shift_range: [-24.0, 24.0]
  dominant_channel:
    enabled: true
    prob: 0.2
    dominant_gain_range: [1.1, 1.45]
    other_gain_range: [0.55, 0.95]
    bias_range: [-12.0, 12.0]
  channel_shuffle:
    enabled: true
    prob: 0.08
  channel_gain:
    enabled: true
    prob: 0.35
    range: [0.8, 1.25]
  highlight_exposure:
    enabled: true
    prob: 0.22
    gain_range: [1.08, 1.35]
    threshold_range: [150, 220]
    rolloff_range: [18.0, 52.0]
  blur:
    enabled: true
    prob: 0.25
    kernel_choices: [3, 5, 7]
  motion_blur:
    enabled: true
    prob: 0.18
    kernel_choices: [3, 5, 7]
  noise:
    enabled: true
    prob: 0.35
    std_range: [2.0, 12.0]
  jpeg:
    enabled: true
    prob: 0.28
    quality_range: [40, 95]
  clahe:
    enabled: true
    prob: 0.22
    clip_limit_range: [1.2, 2.8]
    tile_grid_choices: [6, 8, 10]
  unsharp_mask:
    enabled: true
    prob: 0.2
    kernel_choices: [3, 5]
    amount_range: [0.25, 0.8]
  shadow:
    enabled: true
    prob: 0.2
    darkness_range: [0.2, 0.45]
    major_axis_ratio: [0.18, 0.42]
    minor_axis_ratio: [0.12, 0.28]
    blur_kernel_choices: [31, 51, 71]

occlusion:
  cutout:
    enabled: true
    prob: 0.12
    count_range: [1, 2]
    size_ratio_range: [0.06, 0.12]
    fill_mode: local_patch
  edge_cutout:
    enabled: true
    prob: 0.12
    count_range: [1, 2]
    thickness_ratio_range: [0.04, 0.08]
    length_ratio_range: [0.16, 0.35]
    fill_mode: mean
  corner_cutout:
    enabled: true
    prob: 0.06
    size_ratio_range: [0.08, 0.14]
    fill_mode: random

filter:
  analysis_imgsz: 960
  min_bbox_area_ratio: 0.0005
  min_visible_keypoints_floor: 18
  min_visible_keypoints_ratio: 0.72
  min_bbox_width_px: 10
  min_bbox_height_px: 10
  max_out_of_frame_ratio: 0.35
  max_out_of_frame_ratio_aggressive: 0.25

review:
  enabled: true
  per_bin: 12
  export_dir: analysis/review
