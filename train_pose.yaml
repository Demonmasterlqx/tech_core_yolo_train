model: yolo11n-pose.yaml
data: data/Energy_Core_Position_Estimate.v8-add-blue-real-marker.yolov8/data.yaml
device: auto
project: runs/pose
name: v8_yolo11n_pose
seed: 42
init_mode: scratch

preprocess:
  grayscale: true

train:
  epochs: 100
  batch: 8
  imgsz: 640
  workers: 4
  patience: 50
  save: true
  save_period: -1
  cache: false
  plots: true
  exist_ok: false
  verbose: true

augment:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.0
  mosaic: 1.0
  mixup: 0.0
  copy_paste: 0.0

wandb:
  enabled: true
  project: tech-core-yolo-pose
  entity: null
  group: null
  batch_log_interval: 50
  upload_checkpoints: true
  checkpoint_policy: live
  tags:
    - pose
    - energy-core
  notes: YOLO pose training for Energy Core Position Estimate.

post_eval:
  enabled: true
  project: runs/pose_test
  splits:
    - valid
    - test
  imgsz: 960
  batch: 8
  conf: 0.25
  line_width: 2
