model: yolo11n-pose.yaml
data: data/Energy_Core_Position_Estimate.v6i.yolov8/data.yaml
device: auto
project: runs/pose
name: v6_yolo11n_pose
seed: 42
init_mode: scratch

train:
  epochs: 100
  batch: 8
  imgsz: 640
  workers: 4
  patience: 50
  save: true
  save_period: -1
  cache: false
  plots: true
  exist_ok: false
  verbose: true

augment:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.0
  mosaic: 1.0
  mixup: 0.0
  copy_paste: 0.0

wandb:
  enabled: true
  project: tech-core-yolo-pose
  entity: null
  group: null
  tags:
    - pose
    - energy-core
  notes: YOLO pose training for Energy Core Position Estimate.
